@CONTRACT_TYPE[LunarImpactor]:FINAL
{
    @PARAMETER[MoonImpact]
    {
        @PARAMETER[LunarImpactorAtMoonLow]
        {
            @PARAMETER[ReachMoonSurface]
            {
                @maxTerrainAltitude = 8500
            }
        }
    }
}

@CONTRACT_TYPE[LunarImpactorOptional]:FINAL
{
    @PARAMETER[MoonImpact]
    {
        @PARAMETER[AtMoonLow]
        {
            @PARAMETER[ReachMoonSurface]
            {
                @maxTerrainAltitude = 8500
            }
        }
    }
}