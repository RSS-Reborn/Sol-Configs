@Kopernicus:HAS[@Sol_Configuration:HAS[#SystemScale[Stock]]]:AFTER[SolSystem]
{
    @Body[Sun]
    {
        @Properties
        {
            @radius /= 9
            @gravParameter /= 81
            @ScienceValues
            {
                @flyingAltitudeThreshold /= 3
                @spaceAltitudeThreshold /= 3
            }
        }
        @ScaledVersion
        {
            @Light
            {
                @ScaledIntensityCurve
                {
                    @key,*[0, ] /= 9
                }
                @IntensityCurve
                {
                    @key,*[0, ] /= 9
                }
            }
        }
    }
}














