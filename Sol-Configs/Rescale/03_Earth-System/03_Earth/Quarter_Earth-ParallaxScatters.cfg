@ParallaxScatters:HAS[@Sol_Configuration:HAS[#SystemScale[Quarter]]]:AFTER[SolSystem]
{
    @Body[Earth]
    {
        @Scatter,*
        {
            @Distribution
            {
                @spawnChance /= 4
                @minAltitude /= 4
                @maxAltitude /= 4
            }
        }
        @Scatter[PalmTree]
        {
            @Distribution
            {
                @minAltitude += 9
                @maxAltitude += 6
            }
        }
    }
}