@ParallaxScatters:HAS[@Sol_Configuration:HAS[#SystemScale[Stock]]]:AFTER[SolSystem]
{
    @Body[Earth]
    {
        @Scatter,*
        {
            @Distribution
            {
                @spawnChance /= 9
                @minAltitude /= 9
                @maxAltitude /= 9
            }
        }
        @Scatter[PalmTree]
        {
            @Distribution
            {
                @minAltitude += 7
                @maxAltitude += 7
            }
        }
    }
}