@ParallaxTerrain:HAS[@Sol_Configuration:HAS[#SystemScale[Stock]]]:AFTER[SolSystem]
{
    @Body[Earth]
    {
        @ShaderProperties
        {
            @_LowMidBlendStart /= 9
            @_LowMidBlendEnd /= 9
            @_MidHighBlendStart /= 9
            @_MidHighBlendEnd /= 9
        }
        @ParallaxScaledProperties
        {
            @minTerrainAltitude /= 9
            @maxTerrainAltitude /= 9
        }
    }
}