@Kopernicus:HAS[@Sol_Configuration:HAS[#SystemScale[Stock]]]:AFTER[SolSystem]
{
    @Body[Triton]
    {
        @Orbit
        {
            @semiMajorAxis /= 9
        }
        @Properties
        {
            @radius /= 9
            @gravParameter /= 81
            @rotationPeriod /= 3
            @timewarpAltitudeLimits[*, ] /= 3
            @ScienceValues
            {
                @flyingAltitudeThreshold /= 3
                @spaceAltitudeThreshold /= 3
            }
        }
        @ScaledVersion
        {
            @fadeStart /= 3
            @fadeEnd /= 3
        }
        @PQS
        {
            @maxLevel -= 3
            @fadeStart /= 3
            @fadeEnd /= 3
            @deactivateAltitude /= 3
            @Mods
            {
                @VertexHeightMapBicubic
                {
                    @deformity /= 9
                    @offset /= 9
                }
            }
        }
    }
}
